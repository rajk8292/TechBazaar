<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{Seller/Sellerbase::layout(~{::main})}">

<body>
<main>

<div class="row">
<div class="col-sm-12">

<div class="card shadow">

<div class="card-header bg-primary">
<h4 class="text-center m-0 text-white">All Customer Feedback</h4>
</div>

<div class="card-body">

<div class="table-responsive">

<table class="table table-bordered table-hover">

<thead class="table-light">
<tr>
<th>Sr No</th>
<th>Order Id</th>
<th>Product</th>
<th>Buyer</th>
<th>Rating</th>
<th>Message</th>
<th>Image</th>
<th>Date</th>
<th>Action</th>
</tr>
</thead>

<tbody>

<tr th:each="fb, srno : ${feedbackList}">

<td th:text="${srno.index+1}"></td>

<td th:text="${fb.order.orderNumber}" class="text-primary fw-bold"></td>

<td th:text="${fb.product.productName}"></td>
<td th:text="${fb.order.user.name}"></td>

<td>
<span class="text-warning fw-bold"
      th:text="${fb.rating} + ' ★'"></span>
</td>

<td th:text="${fb.message}"></td>

<td>
<img th:if="${fb.images != null}"
     th:src="@{'/feedback/' + ${fb.images}}"
     style="width:60px;height:60px;object-fit:cover;border-radius:6px;">
</td>

<td th:text="${#temporals.format(fb.submittedAt, 'dd-MMM-yyyy hh:mm a')}"></td>

<td>
<a th:href="@{'/Seller/deleteFeedback/' + ${fb.id}}"
   class="btn btn-danger btn-sm"
   onclick="return confirm('Are you sure you want to delete this feedback?')">
Delete
</a>
</td>

</tr>

</tbody>

</table>

</div>
</div>
</div>

</div>
</div>

</main>
</body>
</html>
