<html th:replace="~{Seller/Sellerbase::layout(~{::main})}">
<head>
<body>
<main>
<div class="row">
   <div class="col-sm-7 mx-auto">
   <p class="text-white text-center bg-primary p-1 mt-2" th:if="${msg}" th:text="${msg}"></p>
   <div class="card shadow mt-5">
   <div class="card-header bg-warning">
   </div>
   <div class="card-body">
   <form th:action="@{/Seller/EditProfile}" th:object="${loggedInSeller}" method="post" enctype="multipart/form-data">
   <div class="row">
   <div class="col-sm-12 text-center mt-3">
   <input type="hidden" th:field="*{id}">
   <img th:src="${session.loggedInSeller.profilePic != null} ? @{/uploads/{img}(img=${session.loggedInSeller.profilePic})} : @{/assets/img/user_img.jpg}" alt="image not found"height="100"width="100"class="border border-primary rounded-circle">
   </div>
   <div class="col-sm-6 mt-3">
   <label>Update name</label>
   <input th:field="*{name}" type="text" class="form-control" required placeholder="Edit Name">
   </div>
   <div class="col-sm-6 mt-3">
   <label>Update Contact No : </label>
   <input th:field="*{contactNo}" type="text" class="form-control" required placeholder="Edit contact No" pattern="[6-9]\d{9}">
   </div>
   <div class="col-sm-6 mt-3">
   <label>Update Profile Pic</label>
   <input type="file" class="form-control" name="profileImage" accept=".png, .jpg, .jpeg, .webp,.bmp">
   </div>
   <div class="col-sm-12 mt-3">
   <textarea th:field="*{address}" rows="2" cols="" class="form-control"></textarea>
   </div>
   <div class="col-sm-12 mt-4 text-center">
   <button type="submit" class="btn btn-danger">Update</button>
   </div>
   </div>
   </form>
   </div>
   </div>
   </div>
   </div>
   </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script>
    var msg="[[${msg}]]";
    if(msg!=""){
    alert("Details Updated Successfully");
    }
    </script>
</main>
</body>
</head>
</html>
