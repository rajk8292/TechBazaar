<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OTP Verification</title>

<!-- ✅ Correct Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- ✅ SweetAlert fixed -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>

<style>
body {
    background: linear-gradient(135deg, #0d6efd, #0a58ca);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.card {
    backdrop-filter: blur(10px);
    background: rgba(255, 255, 255, 0.15);
    border-radius: 20px;
    border: none;
    color: white;
}

.otp-input {
    width: 50px;
    height: 55px;
    font-size: 20px;
    text-align: center;
    border-radius: 10px;
    border: 2px solid #ffffff55;
    background: rgba(255,255,255,0.2);
    color: white;
}

.otp-input:focus {
    border-color: white;
    box-shadow: 0 0 5px white;
}

.btn-primary {
    background: white;
    color: #0d6efd;
    font-weight: 600;
    border-radius: 10px;
}

.btn-primary:hover {
    background: #e6e6e6;
}
</style>
</head>

<body>

<div class="col-md-4">
  <div class="card shadow p-4 text-center">

    <h4>Verify Your Account</h4>
    <p>Enter 6 digit OTP</p>

    <form id="otpForm" action="/verify-otp" method="post">

      <div class="d-flex justify-content-between mb-3">
        <input type="text" maxlength="1" class="form-control otp-input" required>
        <input type="text" maxlength="1" class="form-control otp-input" required>
        <input type="text" maxlength="1" class="form-control otp-input" required>
        <input type="text" maxlength="1" class="form-control otp-input" required>
        <input type="text" maxlength="1" class="form-control otp-input" required>
        <input type="text" maxlength="1" class="form-control otp-input" required>
      </div>

      <input type="hidden" name="otp" id="finalOtp">

      <button type="submit" class="btn btn-primary w-100">
        Verify OTP
      </button>
    </form>

    <div class="mt-3">
      <a href="/ResendOTP" class="text-white">Resend OTP</a>
    </div>

  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const inputs = document.querySelectorAll(".otp-input");
    const form = document.getElementById("otpForm");

    // Auto move next
    inputs.forEach((input, index) => {

        input.addEventListener("input", function() {
            this.value = this.value.replace(/[^0-9]/g, '');
            if (this.value && index < inputs.length - 1) {
                inputs[index + 1].focus();
            }
        });

        input.addEventListener("keydown", function(e) {
            if (e.key === "Backspace" && !this.value && index > 0) {
                inputs[index - 1].focus();
            }
        });
    });

    form.addEventListener("submit", function(e) {

        e.preventDefault();

        let otpValue = "";
        inputs.forEach(input => otpValue += input.value);

        document.getElementById("finalOtp").value = otpValue;

        if(otpValue.length < 6){
            Swal.fire({
                icon: 'error',
                title: 'Incomplete OTP',
                text: 'Enter all 6 digits'
            });
        } else {

            Swal.fire({
                icon: 'success',
                title: 'Verifying...',
                timer: 1000,
                showConfirmButton: false
            }).then(() => {
                form.submit();
            });
        }
    });

});
</script>

</body>
</html>
