<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::main})}">

<head>
    <meta charset="UTF-8">
    <title>Change Password</title>
</head>

<body>
    <main>
        <style>
            /* Modern styles for password page */
            .password-page-wrapper {
                background-color: #f4f6f9;
                min-height: 100vh;
                padding-bottom: 3rem;
                font-family: 'Inter', 'Segoe UI', sans-serif;
            }

            .page-header {
                background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
                color: white;
                padding: 2.5rem 0;
                margin-bottom: -3rem;
                /* Overlap effect */
                border-radius: 0 0 2rem 2rem;
                box-shadow: 0 10px 30px rgba(13, 110, 253, 0.15);
                text-align: center;
            }

            .page-header h2 {
                font-weight: 800;
                letter-spacing: -0.5px;
                margin-bottom: 0.5rem;
            }

            .page-header p {
                opacity: 0.9;
                font-size: 1.1rem;
            }

            .custom-card {
                background: white;
                border-radius: 1.25rem;
                border: none;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
                margin-top: 2rem;
            }

            .form-control {
                border-radius: 0.75rem;
                padding: 0.8rem 1rem;
                border: 1.5px solid #e9ecef;
                background-color: #f8f9fa;
                font-size: 0.95rem;
                transition: all 0.3s ease;
            }

            .form-control:focus {
                border-color: #0d6efd;
                background-color: #fff;
                box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1);
            }

            .form-label {
                font-weight: 600;
                color: #343a40;
                font-size: 0.9rem;
                margin-bottom: 0.5rem;
                display: flex;
                align-items: center;
                gap: 0.5rem;
            }

            .form-label i {
                color: #0d6efd;
                opacity: 0.8;
            }

            .btn-custom {
                border-radius: 0.75rem;
                padding: 0.8rem 1.5rem;
                font-weight: 600;
                letter-spacing: 0.3px;
                transition: all 0.3s ease;
            }

            .btn-primary-custom {
                background: linear-gradient(135deg, #0d6efd, #0056b3);
                border: none;
                color: white;
            }

            .btn-primary-custom:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 25px rgba(13, 110, 253, 0.3);
                color: white;
            }

            .input-group-text {
                border-radius: 0.75rem;
                border: 1.5px solid #e9ecef;
                background-color: #f8f9fa;
                color: #6c757d;
            }

            /* Specific input group radius fix */
            .input-group>.form-control {
                border-top-left-radius: 0 !important;
                border-bottom-left-radius: 0 !important;
            }

            .input-group>.input-group-text {
                border-top-right-radius: 0;
                border-bottom-right-radius: 0;
                border-right: none;
            }
        </style>

        <div class="password-page-wrapper">
            <!-- Page Header -->
            <div class="page-header">
                <div class="container">
                    <h2><i class="fa-solid fa-shield-halved me-2"></i> Security Settings</h2>
                    <p>Update your password to keep your account secure</p>
                </div>
            </div>

            <div class="container pb-5">
                <div class="row justify-content-center">

                    <!-- Change Password Form Section -->
                    <div class="col-lg-5 col-md-7 mt-4">
                        <div class="custom-card p-4 p-md-5 mt-lg-5">
                            <div class="mb-4 text-center">
                                <div class="d-inline-flex justify-content-center align-items-center bg-primary bg-opacity-10 rounded-circle mb-3"
                                    style="width: 70px; height: 70px;">
                                    <i class="fa-solid fa-key text-primary" style="font-size: 1.8rem;"></i>
                                </div>
                                <h4 class="fw-bold mb-1">Change Password</h4>
                                <p class="text-muted">Choose a strong password.</p>
                            </div>

                            <form method="post">
                                <div class="row g-4">
                                    <!-- Old Password -->
                                    <div class="col-12">
                                        <label class="form-label"><i class="fa-solid fa-lock-open"></i> Current
                                            Password</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="fa-solid fa-asterisk"></i></span>
                                            <input name="oldPass" type="password" class="form-control" required
                                                placeholder="Enter your current password">
                                        </div>
                                    </div>

                                    <!-- New Password -->
                                    <div class="col-12 mt-4">
                                        <label class="form-label"><i class="fa-solid fa-lock"></i> New Password</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="fa-solid fa-key"></i></span>
                                            <input name="newPass" type="password" class="form-control" required
                                                placeholder="Enter new password">
                                        </div>
                                        <div class="form-text text-muted small mt-2">
                                            <i class="fa-solid fa-circle-info me-1"></i> Make sure it's at least 8
                                            characters including a number and a lowercase letter.
                                        </div>
                                    </div>

                                    <!-- Confirm Password -->
                                    <div class="col-12">
                                        <label class="form-label"><i class="fa-solid fa-check"></i> Confirm New
                                            Password</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i
                                                    class="fa-solid fa-check-double"></i></span>
                                            <input name="confirmPass" type="password" class="form-control" required
                                                placeholder="Type new password again">
                                        </div>
                                    </div>

                                    <!-- Submit Button -->
                                    <div class="col-12 mt-5 text-center">
                                        <button type="submit"
                                            class="btn btn-custom btn-primary-custom w-100 py-3 shadow-sm">
                                            <i class="fa-solid fa-arrows-rotate me-2"></i> Update Password
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
