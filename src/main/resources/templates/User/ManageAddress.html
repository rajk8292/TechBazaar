<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{base::layout(~{::main})}">

<head>
    <meta charset="UTF-8">
    <title>Manage Addresses</title>
</head>

<body>
    <main>
        <style>
            /* Modern styles for address page */
            .address-page-wrapper {
                background-color: #f4f6f9;
                min-height: 100vh;
                padding-bottom: 3rem;
                font-family: 'Inter', 'Segoe UI', sans-serif;
            }

            .page-header {
                background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
                color: white;
                padding: 2.5rem 0;
                margin-bottom: -3rem;
                /* Overlap effect */
                border-radius: 0 0 2rem 2rem;
                box-shadow: 0 10px 30px rgba(13, 110, 253, 0.15);
                text-align: center;
            }

            .page-header h2 {
                font-weight: 800;
                letter-spacing: -0.5px;
                margin-bottom: 0.5rem;
            }

            .page-header p {
                opacity: 0.9;
                font-size: 1.1rem;
            }

            .custom-card {
                background: white;
                border-radius: 1.25rem;
                border: none;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
                margin-top: 2rem;
            }

            .form-control,
            .form-select {
                border-radius: 0.75rem;
                padding: 0.8rem 1rem;
                border: 1.5px solid #e9ecef;
                background-color: #f8f9fa;
                font-size: 0.95rem;
                transition: all 0.3s ease;
            }

            .form-control:focus,
            .form-select:focus {
                border-color: #0d6efd;
                background-color: #fff;
                box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1);
            }

            .form-label {
                font-weight: 600;
                color: #343a40;
                font-size: 0.9rem;
                margin-bottom: 0.5rem;
                display: flex;
                align-items: center;
                gap: 0.5rem;
            }

            .form-label i {
                color: #0d6efd;
                opacity: 0.8;
            }

            .btn-custom {
                border-radius: 0.75rem;
                padding: 0.8rem 1.5rem;
                font-weight: 600;
                letter-spacing: 0.3px;
                transition: all 0.3s ease;
            }

            .btn-primary-custom {
                background: linear-gradient(135deg, #0d6efd, #0056b3);
                border: none;
                color: white;
            }

            .btn-primary-custom:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 25px rgba(13, 110, 253, 0.3);
                color: white;
            }

            /* Address Cards Design */
            .address-card {
                border-radius: 1rem;
                border: 1px solid #edf2f7;
                background: #ffffff;
                transition: all 0.3s ease;
                height: 100%;
                position: relative;
                overflow: hidden;
            }

            .address-card::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                width: 5px;
                height: 100%;
                transition: all 0.3s ease;
                background: #cbd5e1;
            }

            .address-card.type-Home::before {
                background: #10b981;
                /* Green */
            }

            .address-card.type-Work::before {
                background: #3b82f6;
                /* Blue */
            }

            .address-card:hover {
                transform: translateY(-5px);
                border-color: #e2e8f0;
                box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
            }

            .address-badge {
                font-size: 0.75rem;
                font-weight: 700;
                padding: 0.35rem 0.75rem;
                border-radius: 2rem;
                letter-spacing: 0.5px;
                text-transform: uppercase;
            }

            .badge-Home {
                background-color: rgba(16, 185, 129, 0.1);
                color: #10b981;
            }

            .badge-Work {
                background-color: rgba(59, 130, 246, 0.1);
                color: #3b82f6;
            }

            .address-name {
                font-size: 1.1rem;
                font-weight: 700;
                color: #1e293b;
                margin-bottom: 0.25rem;
            }

            .address-phone {
                color: #64748b;
                font-size: 0.9rem;
                font-weight: 500;
                display: flex;
                align-items: center;
                gap: 0.4rem;
            }

            .address-details {
                color: #475569;
                font-size: 0.95rem;
                line-height: 1.6;
                margin-top: 1rem;
            }

            .address-extra {
                background: #f8fafc;
                border-radius: 0.5rem;
                padding: 0.75rem;
                margin-top: 1rem;
                font-size: 0.85rem;
                color: #64748b;
            }

            .address-actions {
                margin-top: 1.5rem;
                padding-top: 1rem;
                border-top: 1px dashed #e2e8f0;
                display: flex;
                justify-content: flex-end;
                gap: 0.75rem;
            }

            .btn-action {
                border-radius: 0.5rem;
                padding: 0.4rem 1rem;
                font-size: 0.85rem;
                font-weight: 600;
                display: inline-flex;
                align-items: center;
                gap: 0.4rem;
                transition: all 0.2s;
            }

            .btn-edit {
                background: rgba(59, 130, 246, 0.1);
                color: #3b82f6;
                border: none;
            }

            .btn-edit:hover {
                background: #3b82f6;
                color: white;
            }

            .btn-delete {
                background: rgba(239, 68, 68, 0.1);
                color: #ef4444;
                border: none;
            }

            .btn-delete:hover {
                background: #ef4444;
                color: white;
            }

            .radio-box {
                display: flex;
                align-items: center;
                padding: 0.75rem 1rem;
                border: 1.5px solid #e9ecef;
                border-radius: 0.75rem;
                cursor: pointer;
                transition: all 0.2s;
                margin-right: 1rem;
                background: #f8f9fa;
                position: relative;
            }

            .radio-box:hover {
                background: #fff;
                border-color: #ced4da;
            }

            .radio-box input[type="radio"]:checked+label {
                color: #0d6efd;
                font-weight: 600;
            }

            .radio-box:has(input[type="radio"]:checked) {
                border-color: #0d6efd;
                background: rgba(13, 110, 253, 0.05);
            }

            .radio-box label {
                cursor: pointer;
                margin-bottom: 0;
                width: 100%;
            }

            /* Fallback for browsers not supporting :has() */
            input[type="radio"]:checked~label {
                color: #0d6efd;
                font-weight: 600;
            }
        </style>

        <div class="address-page-wrapper">
            <!-- Page Header -->
            <div class="page-header mt-2">
                <div class="container">
                    <h2><i class="fa-solid fa-map-location-dot me-2"></i> Manage Addresses</h2>
                    <p>Add, edit, or delete your delivery locations easily</p>
                </div>
            </div>

            <div class="container">
                <div class="row gx-lg-5 mt-5">

                    <!-- Saved Addresses Section -->
                    <div class="col-lg-5 order-lg-2 mb-5">
                        <div class="d-flex justify-content-between align-items-center mb-4 mt-lg-5">
                            <h4 class="fw-bold text-dark mb-0">
                                <i class="fa-solid fa-address-book text-primary me-2"></i>
                                Saved Addresses
                            </h4>
                            <!-- Mobile view Add button, anchors down to form -->
                            <a href="#addAddressForm" class="d-lg-none btn btn-sm btn-primary-custom rounded-pill">
                                <i class="fa-solid fa-plus"></i> Add
                            </a>
                        </div>

                        <div th:if="${#lists.isEmpty(address)}" class="text-center p-5 custom-card">
                            <img src="https://cdn-icons-png.flaticon.com/512/7466/7466140.png" alt="No address"
                                class="img-fluid mb-3" style="width: 120px; opacity: 0.5;">
                            <h5 class="text-muted fw-bold">No Addresses Found</h5>
                            <p class="text-muted small">You haven't added any addresses yet.</p>
                        </div>

                        <div class="d-flex flex-column gap-3">
                            <div th:each="addr : ${address}">
                                <div class="address-card" th:classappend="'type-' + ${addr.addressType}">
                                    <div class="card-body p-4">
                                        <div class="d-flex justify-content-between align-items-start">
                                            <div>
                                                <div class="address-name" th:text="${addr.name}"></div>
                                                <div class="address-phone">
                                                    <i class="fa-solid fa-phone fa-sm"></i>
                                                    <span th:text="${addr.contactNo}"></span>
                                                </div>
                                            </div>
                                            <span class="address-badge" th:classappend="'badge-' + ${addr.addressType}"
                                                th:text="${addr.addressType}">
                                            </span>
                                        </div>

                                        <div class="address-details">
                                            <span th:text="${addr.address}"></span>,
                                            <span th:text="${addr.locality}"></span><br>
                                            <span class="fw-medium text-dark" th:text="${addr.cityDistrict}"></span>,
                                            <span th:text="${addr.state}"></span> -
                                            <span class="fw-bold text-primary" th:text="${addr.pincode}"></span>
                                        </div>

                                        <div class="address-extra"
                                            th:if="${(addr.landmark != null and addr.landmark != '') or (addr.altContactNo != null and addr.altContactNo != '')}">
                                            <div th:if="${addr.landmark != null and addr.landmark != ''}">
                                                <i class="fa-solid fa-map-pin me-1 text-danger"></i>
                                                <strong>Landmark:</strong> <span th:text="${addr.landmark}"></span>
                                            </div>
                                            <div class="mt-1"
                                                th:if="${addr.altContactNo != null and addr.altContactNo != ''}">
                                                <i class="fa-solid fa-phone-volume me-1 text-success"></i>
                                                <strong>Alt Phone:</strong> <span th:text="${addr.altContactNo}"></span>
                                            </div>
                                        </div>

                                        <div class="address-actions">
                                            <a th:href="@{/EditAddress/{id}(id=${addr.id})}"
                                                class="btn-action btn-edit">
                                                <i class="fa-solid fa-pen-to-square"></i> Edit
                                            </a>
                                            <a th:href="@{/DeleteAddress/{id}(id=${addr.id})}"
                                                class="btn-action btn-delete">
                                                <i class="fa-solid fa-trash-can"></i> Delete
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Add New Address Form Section -->
                    <div class="col-lg-7 order-lg-1" id="addAddressForm">
                        <div class="custom-card p-4 p-md-5">
                            <div class="mb-4">
                                <h4 class="fw-bold mb-1"><i
                                        class="fa-solid fa-location-crosshairs text-primary me-2"></i> Add New Address
                                </h4>
                                <p class="text-muted">Fill in the details below to save a new delivery location.</p>
                            </div>

                            <form action="/User/ManageAddress" method="post" th:object="${dto}"
                                enctype="multipart/form-data">
                                <div class="row g-4">
                                    <!-- Full Name -->
                                    <div class="col-md-6">
                                        <label class="form-label"><i class="fa-regular fa-user"></i> Full Name</label>
                                        <input th:field="${dto.name}" type="text" class="form-control"
                                            placeholder="Enter your Name" required>
                                    </div>

                                    <!-- Contact No -->
                                    <div class="col-md-6">
                                        <label class="form-label"><i class="fa-solid fa-mobile-screen"></i> Mobile
                                            Number</label>
                                        <input th:field="${dto.contactNo}" type="tel" class="form-control"
                                            placeholder="10-digit mobile number" required pattern="[0-9]{10}"
                                            title="Please enter valid 10 digit number">
                                    </div>

                                    <!-- Pincode -->
                                    <div class="col-md-4">
                                        <label class="form-label"><i class="fa-solid fa-hashtag"></i> Pincode</label>
                                        <input th:field="${dto.pincode}" type="text" class="form-control"
                                            placeholder="e.g. 110001" required>
                                    </div>

                                    <!-- Locality -->
                                    <div class="col-md-8">
                                        <label class="form-label"><i class="fa-solid fa-street-view"></i>
                                            Locality</label>
                                        <input th:field="${dto.locality}" type="text" class="form-control"
                                            placeholder="Area / Street / Sector" required>
                                    </div>

                                    <!-- Address -->
                                    <div class="col-12">
                                        <label class="form-label"><i class="fa-regular fa-building"></i> Full
                                            Address</label>
                                        <textarea th:field="${dto.address}" rows="3" class="form-control"
                                            placeholder="House No, Building Name, Road Name" required></textarea>
                                    </div>

                                    <!-- City -->
                                    <div class="col-md-6">
                                        <label class="form-label"><i class="fa-solid fa-city"></i> City /
                                            District</label>
                                        <input th:field="${dto.cityDistrict}" type="text" class="form-control" required>
                                    </div>

                                    <!-- State -->
                                    <div class="col-md-6">
                                        <label class="form-label"><i class="fa-solid fa-map"></i> State</label>
                                        <select th:field="*{state}" class="form-select" required>
                                            <option value="">-- Select State --</option>
                                            <option value="Andhra Pradesh">Andhra Pradesh</option>
                                            <option value="Arunachal Pradesh">Arunachal Pradesh</option>
                                            <option value="Assam">Assam</option>
                                            <option value="Bihar">Bihar</option>
                                            <option value="Chhattisgarh">Chhattisgarh</option>
                                            <option value="Goa">Goa</option>
                                            <option value="Gujarat">Gujarat</option>
                                            <option value="Haryana">Haryana</option>
                                            <option value="Himachal Pradesh">Himachal Pradesh</option>
                                            <option value="Jharkhand">Jharkhand</option>
                                            <option value="Karnataka">Karnataka</option>
                                            <option value="Kerala">Kerala</option>
                                            <option value="Madhya Pradesh">Madhya Pradesh</option>
                                            <option value="Maharashtra">Maharashtra</option>
                                            <option value="Manipur">Manipur</option>
                                            <option value="Meghalaya">Meghalaya</option>
                                            <option value="Mizoram">Mizoram</option>
                                            <option value="Nagaland">Nagaland</option>
                                            <option value="Odisha">Odisha</option>
                                            <option value="Punjab">Punjab</option>
                                            <option value="Rajasthan">Rajasthan</option>
                                            <option value="Sikkim">Sikkim</option>
                                            <option value="Tamil Nadu">Tamil Nadu</option>
                                            <option value="Telangana">Telangana</option>
                                            <option value="Tripura">Tripura</option>
                                            <option value="Uttar Pradesh">Uttar Pradesh</option>
                                            <option value="Uttarakhand">Uttarakhand</option>
                                            <option value="West Bengal">West Bengal</option>
                                        </select>
                                    </div>

                                    <!-- Landmark -->
                                    <div class="col-md-6">
                                        <label class="form-label"><i class="fa-solid fa-location-dot"></i> Landmark
                                            (Optional)</label>
                                        <input th:field="${dto.landmark}" type="text" class="form-control"
                                            placeholder="e.g. Near Apollo Hospital">
                                    </div>

                                    <!-- Alternate Contact -->
                                    <div class="col-md-6">
                                        <label class="form-label"><i class="fa-solid fa-phone"></i> Alternate Mobile
                                            (Optional)</label>
                                        <input th:field="${dto.altContactNo}" type="tel" class="form-control"
                                            placeholder="10-digit mobile number" pattern="[0-9]{10}">
                                    </div>

                                    <!-- Address Type -->
                                    <div class="col-12 mt-4">
                                        <label class="form-label d-block mb-3"><i class="fa-solid fa-tag"></i> Address
                                            Type</label>
                                        <div class="d-flex flex-wrap">
                                            <div class="radio-box">
                                                <input th:field="${dto.addressType}" class="form-check-input me-2 mt-0"
                                                    type="radio" value="Home" id="typeHome" checked>
                                                <label class="form-check-label d-flex align-items-center"
                                                    for="typeHome">
                                                    <i class="fa-solid fa-house me-2 text-success"></i> Home
                                                </label>
                                            </div>
                                            <div class="radio-box">
                                                <input th:field="${dto.addressType}" class="form-check-input me-2 mt-0"
                                                    type="radio" value="Work" id="typeWork">
                                                <label class="form-check-label d-flex align-items-center"
                                                    for="typeWork">
                                                    <i class="fa-solid fa-briefcase me-2 text-primary"></i> Work
                                                </label>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Submit Button -->
                                    <div class="col-12 mt-5 text-end">
                                        <button type="submit"
                                            class="btn btn-custom btn-primary-custom w-100 py-3 shadow-sm">
                                            <i class="fa-solid fa-floppy-disk me-2"></i> Save Address
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
