<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TechBazaar - User Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
    background:  #008ecc;
    min-height:100vh;
}

/* Card */
.card{
    border:none;
    border-radius:18px;
    box-shadow:0 15px 40px rgba(255,102,0,0.2);
}

/* Heading */
.card h4{
    color: #008ecc;
    font-weight:700;
}

/* Inputs */
.form-control{
    border-radius:10px;
    padding:10px 15px;
    border:1px solid  #008ecc;
    transition:0.3s;
}

.form-control:focus{
    border-color:#ff6600;
    box-shadow:0 0 8px rgba(255,102,0,0.4);
}

/* Button */
.btn-primary{
    background:  #008ecc;
    border:none;
    border-radius:30px;
    padding:10px 40px;
    font-weight:600;
    transition:0.3s;
}

.btn-primary:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(255,102,0,0.4);
}

/* Password Icon */
.password-wrapper{
    position:relative;
}

.password-wrapper i{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    color: #008ecc;
}

/* Back Button */
.back-btn{
    border-radius:25px;
}
</style>
</head>

<body>

<div class="container mt-5">
<div class="row">
<div class="col-lg-7 col-md-9 mx-auto">

<div class="card p-5">

<h4 class="text-center mb-4">User Registration</h4>

<form action="/Register" method="post" th:object="${dto}">
<div class="row">

<div class="col-sm-6 mt-3">
<label>Name</label>
<input th:field="*{name}" type="text" class="form-control" required placeholder="Enter Name">
</div>

<div class="col-sm-6 mt-3">
<label>Email</label>
<input th:field="*{email}" type="email" class="form-control" required placeholder="Enter Email">
</div>

<div class="col-sm-6 mt-3">
<label>Contact No</label>
<input th:field="*{contactNo}" type="text" class="form-control" required pattern="[6-9]\d{9}" placeholder="Enter Contact No">
</div>

<div class="col-sm-6 mt-3">
<label>Password</label>
<div class="password-wrapper">
<input th:field="*{password}" type="password" id="password" class="form-control" required placeholder="Enter Password">
<i class="fa-solid fa-eye" onclick="togglePassword()"></i>
</div>
</div>

<div class="col-sm-6 mt-3">
<label>Gender</label>
<select th:field="*{gender}" class="form-control">
<option value="">---Select Gender---</option>
<option value="Male">Male</option>
<option value="Female">Female</option>
<option value="Other">Other</option>
</select>
</div>

<div class="col-12 text-center mt-4">
<button type="submit" class="btn btn-primary">Register</button>
</div>

<div class="col-12 text-center mt-3">
<a href="/Login" class="btn btn-outline-secondary back-btn">
<i class="fa-solid fa-arrow-left me-2"></i>Back to Login
</a>
</div>

</div>
</form>

</div>
</div>
</div>
</div>

<script>
function togglePassword(){
    const password = document.getElementById("password");
    const icon = document.querySelector(".password-wrapper i");

    if(password.type === "password"){
        password.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    }else{
        password.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}

var msg = "[[${msg}]]";
if(msg!=""){
    alert(msg);
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
