<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TechBazaar - Login</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
    background: linear-gradient(135deg,#008ecc,#00c6ff);
    min-height:100vh;
}
.card{
    background:white;
}
.register-link:hover{
    color:#008ecc;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
<div class="row mt-5 mb-5">
<div class="col-md-4 mx-auto">

<form action="/Login" method="post" th:object="${dto}">
<div class="card shadow rounded-4 p-4">

<!-- Icon -->
<div class="text-center">
<div style="border:2px solid #008ecc;height:70px;width:70px;border-radius:50%;margin:auto;">
<i class="fa-solid fa-user fs-2 text-primary" style="padding-top:18px;"></i>
</div>
<h4 class="mt-3 fw-bold text-primary">Welcome Back!</h4>
<p class="text-muted">Login to your account</p>
</div>

<!-- Email -->
<label class="fw-bold mt-3">Email</label>
<input type="email" th:field="*{email}" class="form-control rounded-3" required>

<!-- Password -->
<label class="fw-bold mt-3">Password</label>
<input type="password" th:field="*{password}" class="form-control rounded-3" required>

<div class="mt-2">
<input type="checkbox"> Remember me
</div>

<!-- Login Button -->
<button type="submit"
class="btn btn-primary w-100 mt-4 rounded-4 fw-bold">
<i class="fa-solid fa-right-to-bracket me-2"></i>Login
</button>

<div class="text-center mt-3">
<a href="#" class="text-decoration-none">Forgot Password?</a>
</div>

<div class="text-center mt-4">
<p class="mb-2">Don't have an account?</p>

<div class="d-flex justify-content-center gap-3 flex-wrap">

<a href="/Register" 
class="register-card text-decoration-none">
🛒 Buyer
</a>

<a href="/SellerRegistration" 
class="register-card text-decoration-none">
🏪 Seller
</a>

</div>
</div>

<!-- Back to Home -->
<div class="text-center mt-4">
<a href="/" class="btn btn-info rounded-4 px-4">
<i class="fa-solid fa-house me-2"></i>Back to Home
</a>
</div>

</div>
</form>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
